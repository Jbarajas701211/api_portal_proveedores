steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/portal-proveedores-api-core', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/portal-proveedores-api-core']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv:
      - PROVEEDORES_API_CORE_DB_HOST
      - PROVEEDORES_API_CORE_DB_NAME
      - PROVEEDORES_API_CORE_DB_PASSWORD
      - PROVEEDORES_API_CORE_DB_PORT
      - PROVEEDORES_API_CORE_DB_USER
    args:
      - '-c'
      - |
        gcloud run deploy proveedores-api-core \
          --image gcr.io/$PROJECT_ID/portal-proveedores-api-core \
          --platform managed \
          --region us-central1 \
          --no-allow-unauthenticated \
          --service-account portal-proveedores-api-runtime@${_DEPLOY_PROJECT_ID}.iam.gserviceaccount.com \
          --set-env-vars PROVEEDORES_STORAGE_BUCKET=${_PROVEEDORES_STORAGE_BUCKET} \
          --set-secrets "PROVEEDORES_API_CORE_DB_HOST=PROVEEDORES_API_CORE_DB_HOST:latest,PROVEEDORES_API_CORE_DB_NAME=PROVEEDORES_API_CORE_DB_NAME:latest,PROVEEDORES_API_CORE_DB_PASSWORD=PROVEEDORES_API_CORE_DB_PASSWORD:latest,PROVEEDORES_API_CORE_DB_PORT=PROVEEDORES_API_CORE_DB_PORT:latest,PROVEEDORES_API_CORE_DB_USER=PROVEEDORES_API_CORE_DB_USER:latest"

images:
  - 'gcr.io/$PROJECT_ID/portal-proveedores-api-core'

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/${_SECRETS_PROJECT_ID}/secrets/PROVEEDORES_API_CORE_DB_HOST/versions/latest
      env: PROVEEDORES_API_CORE_DB_HOST
    - versionName: projects/${_SECRETS_PROJECT_ID}/secrets/PROVEEDORES_API_CORE_DB_NAME/versions/latest
      env: PROVEEDORES_API_CORE_DB_NAME
    - versionName: projects/${_SECRETS_PROJECT_ID}/secrets/PROVEEDORES_API_CORE_DB_PASSWORD/versions/latest
      env: PROVEEDORES_API_CORE_DB_PASSWORD
    - versionName: projects/${_SECRETS_PROJECT_ID}/secrets/PROVEEDORES_API_CORE_DB_PORT/versions/latest
      env: PROVEEDORES_API_CORE_DB_PORT
    - versionName: projects/${_SECRETS_PROJECT_ID}/secrets/PROVEEDORES_API_CORE_DB_USER/versions/latest
      env: PROVEEDORES_API_CORE_DB_USER

substitutions:
  _DEPLOY_PROJECT_ID: marti-deportes-desarrollo
  _SECRETS_PROJECT_ID: '528869640412'
  _PROVEEDORES_STORAGE_BUCKET: proveedores-documentos-bucket